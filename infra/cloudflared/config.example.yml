# Copy to the VPS: ~/.cloudflared/config.yml
# Replace <TUNNEL_UUID>, paths, and hostnames.

tunnel: <TUNNEL_UUID>
credentials-file: /root/.cloudflared/<TUNNEL_UUID>.json

ingress:
  # Friends dashboard (protect with Cloudflare Access)
  - hostname: dashboard.yourdomain.com
    service: http://127.0.0.1:8765
  # Optional: Slack interactivity (Approve/Reject buttons)
  # - hostname: slack.yourdomain.com
  #   service: http://127.0.0.1:8766
  - service: http_status:404
