<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PloyAgent Analytics</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3;
           --dim: #8b949e; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
           --yellow: #d29922; --purple: #bc8cff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
  h1 { font-size: 1.8em; margin-bottom: 8px; }
  h2 { font-size: 1.3em; margin: 24px 0 12px; color: var(--blue); }
  .subtitle { color: var(--dim); margin-bottom: 20px; }
  .nav { margin-bottom: 20px; }
  .nav a { color: var(--blue); text-decoration: none; margin-right: 16px; }
  .nav a:hover { text-decoration: underline; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .kpi .label { color: var(--dim); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi .value { font-size: 1.8em; font-weight: 700; margin-top: 4px; }
  .kpi .value.green { color: var(--green); }
  .kpi .value.red { color: var(--red); }
  .kpi .value.blue { color: var(--blue); }
  .kpi .value.yellow { color: var(--yellow); }
  .kpi .sub { color: var(--dim); font-size: 0.85em; margin-top: 2px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
  th { text-align: left; padding: 8px; color: var(--dim); border-bottom: 1px solid var(--border); font-weight: 600; }
  td { padding: 8px; border-bottom: 1px solid var(--border); }
  tr:hover { background: rgba(88,166,255,0.05); }
  .win { color: var(--green); }
  .loss { color: var(--red); }
  .pending-tag { color: var(--yellow); }

  .bar-container { display: flex; align-items: center; gap: 8px; }
  .bar { height: 8px; border-radius: 4px; min-width: 2px; }
  .bar.green { background: var(--green); }
  .bar.red { background: var(--red); }

  #loading { text-align: center; padding: 60px; color: var(--dim); font-size: 1.2em; }
  #content { display: none; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn { background: var(--card); border: 1px solid var(--border); border-radius: 6px;
             padding: 8px 16px; color: var(--dim); cursor: pointer; font-size: 0.9em; }
  .tab-btn.active { color: var(--blue); border-color: var(--blue); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .refresh-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .refresh-bar button { background: var(--blue); color: #fff; border: none; border-radius: 6px;
                         padding: 8px 16px; cursor: pointer; font-size: 0.9em; }
  .refresh-bar button:hover { opacity: 0.85; }
  .refresh-bar .last-update { color: var(--dim); font-size: 0.85em; }
</style>
</head>
<body>

<div class="nav">
  <a href="/">Dashboard</a>
  <a href="/paper">Paper trading</a>
  <a href="/analytics"><b>Rec analytics</b></a>
</div>

<h1>PloyAgent Analytics</h1>
<p class="subtitle">Approved recommendations held to market resolution. For BUY/SELL with exit rules, use <a href="/paper" style="color:var(--blue)">Paper trading</a>.</p>

<div class="refresh-bar">
  <button onclick="loadData()">Refresh</button>
  <span class="last-update" id="lastUpdate"></span>
  <label style="color:var(--dim);font-size:0.85em;margin-left:auto;">
    <input type="checkbox" id="autoRefresh" checked> Auto-refresh (30s)
  </label>
</div>

<div id="loading">Loading analytics data...</div>

<div id="content">
  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab-btn active" data-tab="strategy" onclick="switchTab('strategy')">By Strategy</div>
    <div class="tab-btn" data-tab="category" onclick="switchTab('category')">By Sport</div>
    <div class="tab-btn" data-tab="market_type" onclick="switchTab('market_type')">By Market Type</div>
    <div class="tab-btn" data-tab="trades" onclick="switchTab('trades')">All Trades</div>
    <div class="tab-btn" data-tab="resolved" onclick="switchTab('resolved')">Resolved Only</div>
  </div>

  <div class="tab-content active" id="tab-strategy"><div class="card"><table id="strategyTable"></table></div></div>
  <div class="tab-content" id="tab-category"><div class="card"><table id="categoryTable"></table></div></div>
  <div class="tab-content" id="tab-market_type"><div class="card"><table id="marketTypeTable"></table></div></div>
  <div class="tab-content" id="tab-trades"><div class="card"><table id="tradesTable"></table></div></div>
  <div class="tab-content" id="tab-resolved"><div class="card"><table id="resolvedTable"></table></div></div>
</div>

<script>
let data = null;
let refreshTimer = null;

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
}

function pnlClass(v) { return v > 0 ? 'win' : v < 0 ? 'loss' : ''; }
function pnlSign(v) { return v > 0 ? '+' + v.toFixed(2) : v.toFixed(2); }
function pct(v) { return v != null ? v.toFixed(1) + '%' : '-'; }

function renderKPIs(o) {
  const g = document.getElementById('kpiGrid');
  const streak = o.current_streak > 0 ? `${o.current_streak} ${o.streak_type}${o.current_streak > 1 ? 's' : ''}` : '-';
  const pnlColor = o.total_pnl_dollars >= 0 ? 'green' : 'red';
  const wrColor = o.win_rate >= 55 ? 'green' : o.win_rate >= 45 ? 'yellow' : 'red';
  g.innerHTML = `
    <div class="kpi"><div class="label">Total Trades</div><div class="value blue">${o.total_recommendations}</div>
      <div class="sub">${o.total_resolved} resolved / ${o.total_pending} pending</div></div>
    <div class="kpi"><div class="label">Win Rate</div><div class="value ${wrColor}">${pct(o.win_rate)}</div>
      <div class="sub">${o.wins}W - ${o.losses}L</div></div>
    <div class="kpi"><div class="label">Total P&L ($1/trade)</div><div class="value ${pnlColor}">$${pnlSign(o.total_pnl_dollars)}</div>
      <div class="sub">${pnlSign(o.total_pnl_cents)} cents</div></div>
    <div class="kpi"><div class="label">Avg P&L / Trade</div><div class="value ${o.avg_pnl_cents >= 0 ? 'green' : 'red'}">${pnlSign(o.avg_pnl_cents)}c</div></div>
    <div class="kpi"><div class="label">Biggest Win</div><div class="value green">${pnlSign(o.biggest_win_cents)}c</div></div>
    <div class="kpi"><div class="label">Biggest Loss</div><div class="value red">${pnlSign(o.biggest_loss_cents)}c</div></div>
    <div class="kpi"><div class="label">Capital Deployed</div><div class="value blue">$${(o.total_capital_deployed || 0).toFixed(2)}</div>
      <div class="sub">ROI: <span class="${(o.roi_pct || 0) >= 0 ? 'win' : 'loss'}">${(o.roi_pct || 0).toFixed(1)}%</span></div></div>
    <div class="kpi"><div class="label">Open Positions</div><div class="value blue">${o.open_positions || 0}</div>
      <div class="sub">Unrealized: <span class="${o.unrealized_pnl_dollars >= 0 ? 'win' : 'loss'}">$${pnlSign(o.unrealized_pnl_dollars || 0)}</span></div></div>
    <div class="kpi"><div class="label">Current Streak</div><div class="value ${o.streak_type === 'win' ? 'green' : 'red'}">${streak}</div></div>
  `;
}

function renderBreakdown(tableId, rows, keyLabel) {
  const t = document.getElementById(tableId);
  let html = `<thead><tr><th>${keyLabel}</th><th>Trades</th><th>Wins</th><th>Losses</th><th>Win Rate</th><th>P&L (cents)</th><th>P&L ($1/trade)</th><th>Avg P&L</th><th></th></tr></thead><tbody>`;
  if (!rows || rows.length === 0) {
    html += '<tr><td colspan="9" style="text-align:center;color:var(--dim);">No resolved data yet. Waiting for markets to close...</td></tr>';
  }
  for (const r of (rows || [])) {
    const maxPnl = Math.max(...rows.map(x => Math.abs(x.pnl_cents)), 1);
    const barW = Math.max(2, Math.abs(r.pnl_cents) / maxPnl * 120);
    const barColor = r.pnl_cents >= 0 ? 'green' : 'red';
    html += `<tr>
      <td><b>${r.key}</b></td>
      <td>${r.trades}</td>
      <td class="win">${r.wins}</td>
      <td class="loss">${r.losses}</td>
      <td class="${r.win_rate >= 55 ? 'win' : r.win_rate < 45 ? 'loss' : ''}">${pct(r.win_rate)}</td>
      <td class="${pnlClass(r.pnl_cents)}">${pnlSign(r.pnl_cents)}</td>
      <td class="${pnlClass(r.pnl_dollars)}">$${pnlSign(r.pnl_dollars)}</td>
      <td class="${pnlClass(r.avg_pnl_cents)}">${pnlSign(r.avg_pnl_cents)}c</td>
      <td><div class="bar-container"><div class="bar ${barColor}" style="width:${barW}px"></div></div></td>
    </tr>`;
  }
  html += '</tbody>';
  t.innerHTML = html;
}

function renderTrades(tableId, trades) {
  const t = document.getElementById(tableId);
  let html = `<thead><tr><th>#</th><th>Time</th><th>Market</th><th>Strategy</th><th>Sport</th><th>Type</th>
    <th>Dir</th><th>Edge</th><th>Conf</th><th>Score</th><th>Status</th><th>Invested</th><th>P&L</th><th>Unreal.</th><th>Correct</th></tr></thead><tbody>`;
  if (!trades || trades.length === 0) {
    html += '<tr><td colspan="15" style="text-align:center;color:var(--dim);">No trades yet...</td></tr>';
  }
  for (const t2 of (trades || [])) {
    const ts = t2.ts ? new Date(t2.ts).toLocaleString() : '';
    const q = (t2.question || t2.market_id || '').substring(0, 80);
    const dirClass = t2.direction === 'BUY' ? 'win' : 'loss';
    const pnl = t2.pnl_cents != null ? pnlSign(t2.pnl_cents) + 'c' : '-';
    const pnlC = t2.pnl_cents != null ? pnlClass(t2.pnl_cents) : '';
    const correct = t2.correct === true ? '<span class="win">YES</span>' : t2.correct === false ? '<span class="loss">NO</span>' : '<span class="pending-tag">pending</span>';
    const conf = t2.confidence != null ? (t2.confidence * 100).toFixed(0) + '%' : '-';
    const unreal = t2.unrealized_pnl_cents != null ? pnlSign(t2.unrealized_pnl_cents) + 'c' : '-';
    const unrealC = t2.unrealized_pnl_cents != null ? pnlClass(t2.unrealized_pnl_cents) : '';
    const cap = t2.capital_dollars != null ? '$' + t2.capital_dollars.toFixed(2) : '-';
    html += `<tr>
      <td>${t2.id}</td><td style="font-size:0.8em">${ts}</td><td title="${t2.question}">${q}</td>
      <td><code>${t2.strategy_id}</code></td><td>${t2.category}</td><td>${t2.market_type}</td>
      <td class="${dirClass}">${t2.direction}</td><td>${t2.edge_cents}c</td><td>${conf}</td>
      <td>${t2.score}</td><td>${t2.status}</td><td>${cap}</td><td class="${pnlC}">${pnl}</td><td class="${unrealC}">${unreal}</td><td>${correct}</td>
    </tr>`;
  }
  html += '</tbody>';
  t.innerHTML = html;
}

function renderClosedTrades(tableId, trades) {
  const t = document.getElementById(tableId);
  let html = `<thead><tr><th>#</th><th>Time</th><th>Market</th><th>Strategy</th><th>Sport</th><th>Type</th>
    <th>Dir</th><th>Entry</th><th>Invested</th><th>P&L (¢)</th><th>P&L ($)</th><th>ROI%</th><th>Result</th></tr></thead><tbody>`;
  if (!trades || trades.length === 0) {
    html += '<tr><td colspan="13" style="text-align:center;color:var(--dim);">No resolved trades yet...</td></tr>';
  }
  for (const t2 of (trades || [])) {
    const ts = t2.resolved_at ? new Date(t2.resolved_at).toLocaleString() : (t2.ts ? new Date(t2.ts).toLocaleString() : '');
    const q = (t2.question || t2.market_id || '').substring(0, 80);
    const dirClass = t2.direction === 'BUY' ? 'win' : 'loss';
    const pnlC = t2.pnl_cents != null ? pnlSign(t2.pnl_cents) + 'c' : '-';
    const pnlCls = t2.pnl_cents != null ? pnlClass(t2.pnl_cents) : '';
    const pnlD = t2.pnl_dollars != null ? '$' + pnlSign(t2.pnl_dollars) : '-';
    const cap = t2.capital_dollars != null ? '$' + t2.capital_dollars.toFixed(2) : '-';
    const entry = t2.entry_price != null ? t2.entry_price.toFixed(3) : '-';
    const roi = t2.roi_pct != null ? pnlSign(t2.roi_pct) + '%' : '-';
    const roiCls = t2.roi_pct != null ? pnlClass(t2.roi_pct) : '';
    const result = t2.correct === true ? '<span class="win">WIN</span>' : '<span class="loss">LOSS</span>';
    html += `<tr>
      <td>${t2.id}</td><td style="font-size:0.8em">${ts}</td><td title="${t2.question}">${q}</td>
      <td><code>${t2.strategy_id}</code></td><td>${t2.category}</td><td>${t2.market_type}</td>
      <td class="${dirClass}">${t2.direction}</td><td>${entry}</td><td>${cap}</td>
      <td class="${pnlCls}">${pnlC}</td><td class="${pnlCls}">${pnlD}</td><td class="${roiCls}">${roi}</td><td>${result}</td>
    </tr>`;
  }
  html += '</tbody>';
  t.innerHTML = html;
}

async function loadData() {
  try {
    const res = await fetch('/api/analytics');
    data = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    renderKPIs(data.overview);
    renderBreakdown('strategyTable', data.by_strategy, 'Strategy');
    renderBreakdown('categoryTable', data.by_category, 'Sport');
    renderBreakdown('marketTypeTable', data.by_market_type, 'Market Type');
    renderTrades('tradesTable', data.trades);
    renderClosedTrades('resolvedTable', data.resolved_trades);
    document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('loading').textContent = 'Error loading data: ' + e.message;
  }
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (document.getElementById('autoRefresh').checked) loadData();
  }, 30000);
}

loadData();
startAutoRefresh();
</script>
</body>
</html>
